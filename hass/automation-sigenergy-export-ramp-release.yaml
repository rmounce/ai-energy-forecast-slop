alias: Sigen Export Ramp Release (PCS cap revert)
description: >-
  Guarantees the transient PCS export cap is released when the export-ramp hold ends —
  whether timer.sigen_export_ramp finished naturally or was cancelled (by an
  export-limit increase, a mode change, etc.). This fires on the timer's own event, so
  it runs INDEPENDENTLY of the ramp-hold loop: mode:restart cancelling that loop can no
  longer strand the cap (this was Issue 2). It resets the cap helper to 100 and
  re-applies limits; script.sigen_apply_limits already ignores the cap once the timer
  is no longer active, so PCS export returns to native grid-limit load-following the
  instant the hold ends.
triggers:
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.sigen_export_ramp
    id: ramp_finished
  - trigger: event
    event_type: timer.cancelled
    event_data:
      entity_id: timer.sigen_export_ramp
    id: ramp_cancelled
actions:
  # Tidy the helper back to its inert value (cosmetic — apply ignores it now the timer
  # is idle) and recompute the real registers, releasing the PCS export cap.
  - action: input_number.set_value
    target:
      entity_id: input_number.transient_pcs_export_cap
    data:
      value: 100
  - action: script.sigen_apply_limits
mode: queued
max_exceeded: silent
trace:
  stored_traces: 10
