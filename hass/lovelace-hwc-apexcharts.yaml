# Heat-pump hot water (HWC) plan — ApexCharts card.
#
# Paste this as a Manual card on a Lovelace dashboard. Requires the custom
# `apexcharts-card` (HACS → "ApexCharts Card").
#
# It plots the measured tank temperature, executor forecast, stratified-model
# shadow forecast, forecast wet-bulb temperature, planned heat-pump blocks, and
# import-price context. The card is intentionally sparse: the plan is mainly
# judged by whether the temperature forecasts diverge, whether planned reheats
# land in relative price valleys, and whether recovery-speed assumptions track
# ambient conditions.
#
# The plan sensors are published by hwc_planner.py via EMHASS. The forecast
# arrays live in entity attributes (not the state), so each series uses a
# data_generator to unpack them. Values are published as strings → parseFloat.

type: custom:apexcharts-card
header:
  show: true
  title: Hot water plan
  show_states: false
  colorize_states: true
# Forecast runs from "now" for ~72 h. Show recent history, then let the window
# roll continuously instead of snapping to calendar days.
graph_span: 36h
span:
  start: minute
  offset: -12h
now:
  show: true
  label: ''
  color: '#90a4ae'
yaxis:
  - id: temp
    decimals: 0
    apex_config:
      title:
        text: °C
      tickAmount: 5
  - id: price
    opposite: true
    decimals: 2
    apex_config:
      show: false
  - id: ambient
    opposite: true
    decimals: 0
    apex_config:
      show: false
  - id: power
    opposite: true
    decimals: 0
    apex_config:
      show: false
series:
  - entity: sensor.aquatech_current_temperature_local
    name: Tank temp (measured)
    extend_to: false
    type: line
    curve: stepline
    stroke_width: 2
    color: '#1e88e5'
    yaxis_id: temp
  - entity: sensor.hwc_predicted_temp
    name: Tank temp (executor)
    extend_to: false
    type: line
    curve: smooth
    stroke_width: 2
    color: '#1e88e5'
    yaxis_id: temp
    data_generator: |
      return (entity.attributes.predicted_temperatures || []).map(p => {
        return [new Date(p.date).getTime(), parseFloat(p.hwc_predicted_temp)];
      });
  - entity: sensor.hwc_stratified_predicted_temp
    name: Tank temp (stratified shadow)
    extend_to: false
    type: line
    curve: smooth
    stroke_width: 2
    color: '#8e24aa'
    yaxis_id: temp
    data_generator: |
      return (entity.attributes.predicted_temperatures || []).map(p => {
        return [new Date(p.date).getTime(), parseFloat(p.hwc_stratified_predicted_temp)];
      });
  - entity: sensor.hwc_wet_bulb_forecast
    name: Wet bulb (forecast)
    extend_to: false
    type: line
    curve: smooth
    stroke_width: 1
    opacity: 0.45
    color: '#0097a7'
    yaxis_id: ambient
    data_generator: |
      return (entity.attributes.wet_bulb_forecasts || []).map(p => {
        return [new Date(p.date).getTime(), parseFloat(p.hwc_wet_bulb_forecast)];
      });
  - entity: sensor.amber_5min_current_general_price
    name: Import price (actual)
    extend_to: false
    type: line
    curve: stepline
    stroke_width: 1
    opacity: 0.25
    color: '#fb8c00'
    yaxis_id: price
  - entity: sensor.hwc_power_plan
    name: Planned heat pump
    extend_to: false
    type: area
    curve: stepline
    stroke_width: 1
    opacity: 0.16
    color: '#43a047'
    yaxis_id: power
    data_generator: |
      return (entity.attributes.deferrables_schedule || []).map(p => {
        return [new Date(p.date).getTime(), parseFloat(p.hwc_power_plan)];
      });
  - entity: sensor.hwc_unit_load_cost
    name: Import price (forecast)
    extend_to: false
    type: line
    curve: stepline
    stroke_width: 1
    opacity: 0.35
    color: '#fb8c00'
    yaxis_id: price
    data_generator: |
      return (entity.attributes.unit_load_cost_forecasts || []).map(p => {
        return [new Date(p.date).getTime(), parseFloat(p.hwc_unit_load_cost)];
      });
apex_config:
  chart:
    height: 320
