# Heat-pump hot water (HWC) plan — ApexCharts card.
#
# Paste this as a Manual card on a Lovelace dashboard. Requires the custom
# `apexcharts-card` (HACS → "ApexCharts Card").
#
# It plots the published HWC plan (see docs/hwc_emhass.md): predicted tank
# temperature, the planned heat-pump power, and the import-price forecast that
# drives the schedule — so you can eyeball that the reheat lands in the cheap
# window and respects the 45 °C floor / 60 °C legionella target.
#
# The plan sensors are published by hwc_planner.py via EMHASS. The forecast
# arrays live in entity attributes (not the state), so each series uses a
# data_generator to unpack them. Values are published as strings → parseFloat.

type: custom:apexcharts-card
header:
  show: true
  title: Hot water plan
  show_states: true
  colorize_states: true
# Forecast runs from "now" for ~72 h; start the window at midnight today so the
# whole forecast is visible regardless of run time.
graph_span: 84h
span:
  start: day
now:
  show: true
  label: Now
  color: '#90a4ae'
yaxis:
  - id: temp
    min: 40
    max: 65
    decimals: 0
    apex_config:
      title:
        text: °C
      tickAmount: 5
  - id: power
    opposite: true
    min: 0
    max: 1000
    decimals: 0
    apex_config:
      title:
        text: W
  - id: price
    opposite: true
    min: 0
    decimals: 2
    apex_config:
      title:
        text: $/kWh
series:
  - entity: sensor.hwc_predicted_temp
    name: Tank temp (predicted)
    type: line
    curve: smooth
    stroke_width: 2
    color: '#1e88e5'
    yaxis_id: temp
    data_generator: |
      return (entity.attributes.predicted_temperatures || []).map(p => {
        return [new Date(p.date).getTime(), parseFloat(p.hwc_predicted_temp)];
      });
  - entity: sensor.hwc_power_plan
    name: Planned power
    type: area
    curve: stepline
    stroke_width: 1
    opacity: 0.25
    color: '#43a047'
    yaxis_id: power
    data_generator: |
      return (entity.attributes.deferrables_schedule || []).map(p => {
        return [new Date(p.date).getTime(), parseFloat(p.hwc_power_plan)];
      });
  - entity: sensor.hwc_unit_load_cost
    name: Import price
    type: line
    curve: stepline
    stroke_width: 1.5
    color: '#fb8c00'
    yaxis_id: price
    data_generator: |
      return (entity.attributes.unit_load_cost_forecasts || []).map(p => {
        return [new Date(p.date).getTime(), parseFloat(p.hwc_unit_load_cost)];
      });
apex_config:
  chart:
    height: 320
  annotations:
    yaxis:
      - y: 45
        yAxisIndex: 0
        borderColor: '#e53935'
        strokeDashArray: 4
        label:
          text: Floor 45°C
          style:
            color: '#fff'
            background: '#e53935'
      - y: 60
        yAxisIndex: 0
        borderColor: '#fb8c00'
        strokeDashArray: 4
        label:
          text: Legionella 60°C
          style:
            color: '#fff'
            background: '#fb8c00'
