input_select:
  # 2026-05-08: ai_shadow removed from EMHASS source-selector options per reviewer
  # call. Rationale: live visual shadowing (TFT/PD-direct triplet sensors) and
  # selectable EMHASS control are different risk surfaces. Leaving an option that
  # routes control to potentially-stale bundle entities is a foot-gun. Re-add when
  # there is a deliberate decision to make a controllable path. Dashboard sensors
  # continue publishing.
  emhass_mpc_price_source:
    name: EMHASS MPC Price Source
    options:
      - amber
    initial: amber

  emhass_dh_price_source:
    name: EMHASS DH Price Source
    options:
      - amber_lgbm_extrapolated
    initial: amber_lgbm_extrapolated

template:
  - sensor:
    - name: 'Amber Effective General Price'
      unit_of_measurement: "$/kWh"
      device_class: monetary
      state: >
        {% set ns = namespace(value='unknown') %}
        {% if as_datetime(state_attr('sensor.amber_5min_current_general_price', 'end_time')) > utcnow() %}
          {% set ns.value = states('sensor.amber_5min_current_general_price') %}
        {% else %}
          {% for item in state_attr('sensor.amber_5min_forecasts_general_price', 'Forecasts') %}
            {% if ns.value == 'unknown' and as_datetime(item.end_time) > utcnow() %}
              {% set weight = states('input_number.emhass_weight_buy_forecast') | float(0) %}
              {% set p50 = item.advanced_price_predicted %}
              {% set high = item.advanced_price_high %}
              {% set low = item.advanced_price_low %}

              {% if weight > 0 %}
                {% set adjusted_price = p50 + (high - p50) * weight %}
              {% else %}
                {% set adjusted_price = p50 - (p50 - low) * (weight | abs) %}
              {% endif %}
              
              {# Safeguard: Use the higher of the blended price or the raw per_kwh forecast #}
              {% set ns.value = [adjusted_price, item.per_kwh] | max %}
            {% endif %}
          {% endfor %}
        {% endif %}
        {{ ns.value | round(6) }}

    - name: 'Amber Effective Feed In Price'
      unit_of_measurement: "$/kWh"
      device_class: monetary
      state: >
        {% set ns = namespace(value='unknown') %}
        {% set base_price = 0 %}

        {# First, get the base price from either the current sensor or the next forecast #}
        {% if as_datetime(state_attr('sensor.amber_5min_current_feed_in_price', 'end_time')) > utcnow() %}
          {% set base_price = states('sensor.amber_5min_current_feed_in_price') | float(0) %}
        {% else %}
          {% for item in state_attr('sensor.amber_5min_forecasts_feed_in_price', 'Forecasts') %}
            {% if ns.value == 'unknown' and as_datetime(item.end_time) > utcnow() %}
              {% set weight = states('input_number.emhass_weight_sell_forecast') | float(0) %}

              {# Amber's feed-in prices are negative. We negate them to work with positive numbers. #}
              {% set p50  = -item.advanced_price_predicted %}
              {% set high = -item.advanced_price_high %}
              {% set low  = -item.advanced_price_low %}

              {% if weight > 0 %}
                {# Positive weight blends towards a more optimistic (higher) feed-in price #}
                {% set adjusted_price = p50 + (high - p50) * weight %}
              {% else %}
                {# Negative weight blends towards a more pessimistic (lower) feed-in price #}
                {% set adjusted_price = p50 - (p50 - low) * (weight | abs) %}
              {% endif %}
              
              {# Safeguard: Use the lower (more pessimistic) of the blended price or the raw per_kwh forecast #}
              {% set ns.value = [adjusted_price, -item.per_kwh] | min %}
            {% endif %}
          {% endfor %}
          {% set base_price = ns.value %}
        {% endif %}

        {# ================================================================= #}
        {#               START: DNSP FREE TIER ADJUSTMENT                    #}
        {# ================================================================= #}
        {% set final_base_price = base_price | float(0) %}
        {% set allowance = states('input_number.sapn_free_exports') | float(0) %}
        {% set current_hour = now().hour %}

        {# If we are in the 10am-4pm window AND have allowance, add 1c ($0.01) #}
        {% if 10 <= current_hour < 16 and allowance > 0 %}
          {{ (final_base_price + 0.01) | round(6) }}
        {% else %}
          {{ final_base_price | round(6) }}
        {% endif %}
        {# ================================================================= #}
        {#                END: DNSP FREE TIER ADJUSTMENT                     #}
        {# ================================================================= #}

    - name: 'EMHASS Selected MPC Price Source'
      state: "{{ states('input_select.emhass_mpc_price_source') }}"
      attributes:
        production_default: amber
        ai_import_entity: sensor.ai_mpc_import_price_forecast
        ai_export_entity: sensor.ai_mpc_export_price_forecast

    - name: 'EMHASS Selected DH Price Source'
      state: "{{ states('input_select.emhass_dh_price_source') }}"
      attributes:
        production_default: amber_lgbm_extrapolated
        ai_import_entity: sensor.ai_dh_import_price_forecast
        ai_export_entity: sensor.ai_dh_export_price_forecast

    - name: 'AI MPC Price Forecast Status'
      state: >
        {%- set import_forecast = state_attr('sensor.ai_mpc_import_price_forecast', 'forecast') | default([], true) %}
        {%- set export_forecast = state_attr('sensor.ai_mpc_export_price_forecast', 'forecast') | default([], true) %}
        {%- if import_forecast | count >= 168 and export_forecast | count >= 168 %}
          ready
        {%- else %}
          not_ready
        {%- endif %}
      attributes:
        expected_count: 168
        interval_minutes: 5
        import_count: >
          {{ state_attr('sensor.ai_mpc_import_price_forecast', 'forecast') | default([], true) | count }}
        export_count: >
          {{ state_attr('sensor.ai_mpc_export_price_forecast', 'forecast') | default([], true) | count }}
        import_first_value: >
          {%- set forecast = state_attr('sensor.ai_mpc_import_price_forecast', 'forecast') | default([], true) %}
          {{ forecast[0].native_value if forecast | count > 0 else none }}
        export_first_value: >
          {%- set forecast = state_attr('sensor.ai_mpc_export_price_forecast', 'forecast') | default([], true) %}
          {{ forecast[0].native_value if forecast | count > 0 else none }}
        import_first_datetime: >
          {%- set forecast = state_attr('sensor.ai_mpc_import_price_forecast', 'forecast') | default([], true) %}
          {{ forecast[0].datetime if forecast | count > 0 else none }}
        export_first_datetime: >
          {%- set forecast = state_attr('sensor.ai_mpc_export_price_forecast', 'forecast') | default([], true) %}
          {{ forecast[0].datetime if forecast | count > 0 else none }}
        convention: haeo_positive_import_export
        timestamp_convention: utc_iso8601

    - name: 'AI DH Price Forecast Status'
      state: >
        {%- set import_forecast = state_attr('sensor.ai_dh_import_price_forecast', 'forecast') | default([], true) %}
        {%- set export_forecast = state_attr('sensor.ai_dh_export_price_forecast', 'forecast') | default([], true) %}
        {%- if import_forecast | count >= 144 and export_forecast | count >= 144 %}
          ready
        {%- else %}
          not_ready
        {%- endif %}
      attributes:
        expected_count: 144
        interval_minutes: 30
        import_count: >
          {{ state_attr('sensor.ai_dh_import_price_forecast', 'forecast') | default([], true) | count }}
        export_count: >
          {{ state_attr('sensor.ai_dh_export_price_forecast', 'forecast') | default([], true) | count }}
        import_first_value: >
          {%- set forecast = state_attr('sensor.ai_dh_import_price_forecast', 'forecast') | default([], true) %}
          {{ forecast[0].native_value if forecast | count > 0 else none }}
        export_first_value: >
          {%- set forecast = state_attr('sensor.ai_dh_export_price_forecast', 'forecast') | default([], true) %}
          {{ forecast[0].native_value if forecast | count > 0 else none }}
        import_first_datetime: >
          {%- set forecast = state_attr('sensor.ai_dh_import_price_forecast', 'forecast') | default([], true) %}
          {{ forecast[0].datetime if forecast | count > 0 else none }}
        export_first_datetime: >
          {%- set forecast = state_attr('sensor.ai_dh_export_price_forecast', 'forecast') | default([], true) %}
          {{ forecast[0].datetime if forecast | count > 0 else none }}
        convention: haeo_positive_import_export
        timestamp_convention: utc_iso8601

    - name: 'AI Spot Price Forecast Low'
      unit_of_measurement: "$/kWh"
      device_class: monetary
      availability: >
        {{ not is_state('sensor.ai_pd_direct_price_forecast_low', 'unavailable') }}
      state: >
        {%- set p5min = state_attr('sensor.ai_p5min_price_forecast_low', 'forecasts') | default([], true) %}
        {%- if p5min | count > 0 %}
          {{ (p5min[0].wholesale_price | default(p5min[0].aemo_price_sa1, true)) | round(4) }}
        {%- else %}
          {%- set fc = state_attr('sensor.ai_pd_direct_price_forecast_low', 'forecasts') | default([], true) %}
          {{ fc[0].wholesale_price | round(4) if fc | count > 0 else 'unknown' }}
        {%- endif %}
      attributes:
        recommended_use: graph_only_raw_wholesale_comparison
        unit_convention: positive_wholesale_price_per_kwh
        timestamp_convention: utc_iso8601
        source_5min_entity: sensor.ai_p5min_price_forecast_low
        source_30min_entity: sensor.ai_pd_direct_price_forecast_low
        p5min_count: >
          {{ state_attr('sensor.ai_p5min_price_forecast_low', 'forecasts') | default([], true) | count }}
        p30min_count: >
          {{ state_attr('sensor.ai_pd_direct_price_forecast_low', 'forecasts') | default([], true) | count }}
        forecasts: >
          {%- set p5min = state_attr('sensor.ai_p5min_price_forecast_low', 'forecasts') | default([], true) %}
          {%- set p30min = state_attr('sensor.ai_pd_direct_price_forecast_low', 'forecasts') | default([], true) %}
          {%- set ns = namespace(result=[]) %}
          {%- for item in p5min %}
            {%- set price = item.wholesale_price | default(item.aemo_price_sa1, true) %}
            {%- set ns.result = ns.result + [{'timestamp': item.timestamp, 'wholesale_price': price}] %}
          {%- endfor %}
          {%- set cutoff = (p5min | last).timestamp if p5min | count > 0 else '' %}
          {%- for item in p30min %}
            {%- if item.timestamp > cutoff %}
              {%- set ns.result = ns.result + [{'timestamp': item.timestamp, 'wholesale_price': item.wholesale_price}] %}
            {%- endif %}
          {%- endfor %}
          {{ ns.result | tojson }}

    - name: 'AI Spot Price Forecast'
      unit_of_measurement: "$/kWh"
      device_class: monetary
      availability: >
        {{ not is_state('sensor.ai_pd_direct_price_forecast', 'unavailable') }}
      state: >
        {%- set p5min = state_attr('sensor.ai_p5min_price_forecast', 'forecasts') | default([], true) %}
        {%- if p5min | count > 0 %}
          {{ (p5min[0].wholesale_price | default(p5min[0].aemo_price_sa1, true)) | round(4) }}
        {%- else %}
          {%- set fc = state_attr('sensor.ai_pd_direct_price_forecast', 'forecasts') | default([], true) %}
          {{ fc[0].wholesale_price | round(4) if fc | count > 0 else 'unknown' }}
        {%- endif %}
      attributes:
        recommended_use: graph_only_raw_wholesale_comparison
        unit_convention: positive_wholesale_price_per_kwh
        timestamp_convention: utc_iso8601
        source_5min_entity: sensor.ai_p5min_price_forecast
        source_30min_entity: sensor.ai_pd_direct_price_forecast
        p5min_count: >
          {{ state_attr('sensor.ai_p5min_price_forecast', 'forecasts') | default([], true) | count }}
        p30min_count: >
          {{ state_attr('sensor.ai_pd_direct_price_forecast', 'forecasts') | default([], true) | count }}
        forecasts: >
          {%- set p5min = state_attr('sensor.ai_p5min_price_forecast', 'forecasts') | default([], true) %}
          {%- set p30min = state_attr('sensor.ai_pd_direct_price_forecast', 'forecasts') | default([], true) %}
          {%- set ns = namespace(result=[]) %}
          {%- for item in p5min %}
            {%- set price = item.wholesale_price | default(item.aemo_price_sa1, true) %}
            {%- set ns.result = ns.result + [{'timestamp': item.timestamp, 'wholesale_price': price}] %}
          {%- endfor %}
          {%- set cutoff = (p5min | last).timestamp if p5min | count > 0 else '' %}
          {%- for item in p30min %}
            {%- if item.timestamp > cutoff %}
              {%- set ns.result = ns.result + [{'timestamp': item.timestamp, 'wholesale_price': item.wholesale_price}] %}
            {%- endif %}
          {%- endfor %}
          {{ ns.result | tojson }}

    - name: 'AI Spot Price Forecast High'
      unit_of_measurement: "$/kWh"
      device_class: monetary
      availability: >
        {{ not is_state('sensor.ai_pd_direct_price_forecast_high', 'unavailable') }}
      state: >
        {%- set p5min = state_attr('sensor.ai_p5min_price_forecast_high', 'forecasts') | default([], true) %}
        {%- if p5min | count > 0 %}
          {{ (p5min[0].wholesale_price | default(p5min[0].aemo_price_sa1, true)) | round(4) }}
        {%- else %}
          {%- set fc = state_attr('sensor.ai_pd_direct_price_forecast_high', 'forecasts') | default([], true) %}
          {{ fc[0].wholesale_price | round(4) if fc | count > 0 else 'unknown' }}
        {%- endif %}
      attributes:
        recommended_use: graph_only_raw_wholesale_comparison
        unit_convention: positive_wholesale_price_per_kwh
        timestamp_convention: utc_iso8601
        source_5min_entity: sensor.ai_p5min_price_forecast_high
        source_30min_entity: sensor.ai_pd_direct_price_forecast_high
        p5min_count: >
          {{ state_attr('sensor.ai_p5min_price_forecast_high', 'forecasts') | default([], true) | count }}
        p30min_count: >
          {{ state_attr('sensor.ai_pd_direct_price_forecast_high', 'forecasts') | default([], true) | count }}
        forecasts: >
          {%- set p5min = state_attr('sensor.ai_p5min_price_forecast_high', 'forecasts') | default([], true) %}
          {%- set p30min = state_attr('sensor.ai_pd_direct_price_forecast_high', 'forecasts') | default([], true) %}
          {%- set ns = namespace(result=[]) %}
          {%- for item in p5min %}
            {%- set price = item.wholesale_price | default(item.aemo_price_sa1, true) %}
            {%- set ns.result = ns.result + [{'timestamp': item.timestamp, 'wholesale_price': price}] %}
          {%- endfor %}
          {%- set cutoff = (p5min | last).timestamp if p5min | count > 0 else '' %}
          {%- for item in p30min %}
            {%- if item.timestamp > cutoff %}
              {%- set ns.result = ns.result + [{'timestamp': item.timestamp, 'wholesale_price': item.wholesale_price}] %}
            {%- endif %}
          {%- endfor %}
          {{ ns.result | tojson }}

    - name: 'EMHASS MPC Price Diagnostic'
      state: "{{ states('input_select.emhass_mpc_price_source') }}"
      attributes:
        ai_ready: >
          {%- set imp = state_attr('sensor.ai_mpc_import_price_forecast', 'forecast') | default([], true) %}
          {%- set exp = state_attr('sensor.ai_mpc_export_price_forecast', 'forecast') | default([], true) %}
          {{ imp | count >= 168 and exp | count >= 168 }}
        amber_import_first: >
          {%- set fc = state_attr('sensor.amber_5min_forecasts_extended_general_price', 'Forecasts') | default([], true) %}
          {%- set future = fc | selectattr('start_time', 'defined') | list %}
          {%- set item = future | selectattr('start_time', 'ne', none) | first | default(none) %}
          {{ item.advanced_price_predicted if item else none }}
        amber_export_first: >
          {%- set fc = state_attr('sensor.amber_5min_forecasts_extended_feed_in_price', 'Forecasts') | default([], true) %}
          {%- set item = fc | first | default(none) %}
          {{ (-item.advanced_price_predicted) if item else none }}
        ai_import_first: >
          {%- set fc = state_attr('sensor.ai_mpc_import_price_forecast', 'forecast') | default([], true) %}
          {%- set item = fc | selectattr('datetime', 'defined') | first | default(none) %}
          {{ item.native_value if item else none }}
        ai_export_first: >
          {%- set fc = state_attr('sensor.ai_mpc_export_price_forecast', 'forecast') | default([], true) %}
          {%- set item = fc | selectattr('datetime', 'defined') | first | default(none) %}
          {{ item.native_value if item else none }}
        ai_import_mean_1h: >
          {%- set fc = state_attr('sensor.ai_mpc_import_price_forecast', 'forecast') | default([], true) %}
          {%- set vals = fc[:12] | map(attribute='native_value') | list %}
          {{ (vals | sum / vals | count) | round(4) if vals | count > 0 else none }}
        ai_export_mean_1h: >
          {%- set fc = state_attr('sensor.ai_mpc_export_price_forecast', 'forecast') | default([], true) %}
          {%- set vals = fc[:12] | map(attribute='native_value') | list %}
          {{ (vals | sum / vals | count) | round(4) if vals | count > 0 else none }}
        amber_import_mean_1h: >
          {%- set fc = state_attr('sensor.amber_5min_forecasts_extended_general_price', 'Forecasts') | default([], true) %}
          {%- set vals = fc[:12] | map(attribute='advanced_price_predicted') | list %}
          {{ (vals | sum / vals | count) | round(4) if vals | count > 0 else none }}

    - name: 'EMHASS DH Price Diagnostic'
      state: "{{ states('input_select.emhass_dh_price_source') }}"
      attributes:
        ai_ready: >
          {%- set imp = state_attr('sensor.ai_dh_import_price_forecast', 'forecast') | default([], true) %}
          {%- set exp = state_attr('sensor.ai_dh_export_price_forecast', 'forecast') | default([], true) %}
          {{ imp | count >= 144 and exp | count >= 144 }}
        amber_import_first: >
          {%- set fc = state_attr('sensor.amber_billing_interval_forecasts_general_price', 'Forecasts') | default([], true) %}
          {%- set item = fc | first | default(none) %}
          {{ item.advanced_price_predicted if item else none }}
        amber_export_first: >
          {%- set fc = state_attr('sensor.amber_billing_interval_forecasts_feed_in_price', 'Forecasts') | default([], true) %}
          {%- set item = fc | first | default(none) %}
          {{ (-item.advanced_price_predicted) if item else none }}
        ai_import_first: >
          {%- set fc = state_attr('sensor.ai_dh_import_price_forecast', 'forecast') | default([], true) %}
          {%- set item = fc | first | default(none) %}
          {{ item.native_value if item else none }}
        ai_export_first: >
          {%- set fc = state_attr('sensor.ai_dh_export_price_forecast', 'forecast') | default([], true) %}
          {%- set item = fc | first | default(none) %}
          {{ item.native_value if item else none }}
        ai_import_mean_24h: >
          {%- set fc = state_attr('sensor.ai_dh_import_price_forecast', 'forecast') | default([], true) %}
          {%- set vals = fc[:48] | map(attribute='native_value') | list %}
          {{ (vals | sum / vals | count) | round(4) if vals | count > 0 else none }}
        ai_export_mean_24h: >
          {%- set fc = state_attr('sensor.ai_dh_export_price_forecast', 'forecast') | default([], true) %}
          {%- set vals = fc[:48] | map(attribute='native_value') | list %}
          {{ (vals | sum / vals | count) | round(4) if vals | count > 0 else none }}
        amber_import_mean_24h: >
          {%- set fc = state_attr('sensor.amber_billing_interval_forecasts_general_price', 'Forecasts') | default([], true) %}
          {%- set vals = fc[:48] | map(attribute='advanced_price_predicted') | list %}
          {{ (vals | sum / vals | count) | round(4) if vals | count > 0 else none }}

rest_command:
  emhass_dayahead_optim:
    url: !secret emhass_url_optim
    method: POST
    timeout: 120
    headers:
      content-type: application/json
    payload: >-
      {
        "entity_save": true,
        "publish_prefix":"dh_",
        
        {# 1. Calculate GROSS PV Forecast (removing the old -150W flat subtraction) #}
        {%- set current_pv_interval = utcnow() - timedelta(minutes=30) %}
        {%- set pv_forecast_gross = namespace(values=[]) %}
        
        {#- Get the PV risk aversion factor 'k_pv' from your input helper (-1.0 to 1.0) #}
        {%- set k_pv = states('input_number.emhass_weight_pv_forecast') | float(0) %}
        
        {%- set solcast_forecasts =['sensor.solcast_pv_forecast_forecast_today', 'sensor.solcast_pv_forecast_forecast_tomorrow', 'sensor.solcast_pv_forecast_forecast_day_3', 'sensor.solcast_pv_forecast_forecast_day_4']
          | map('state_attr', 'detailedForecast')
          | map('selectattr', 'period_start', 'gt', current_pv_interval)
          | map('list') | sum(start=[]) %}

        {%- for item in solcast_forecasts %}
          {%- set p50 = item.pv_estimate | float(0) %}
          {%- set p10 = item.pv_estimate10 | float(0) %}
          {%- set p90 = item.pv_estimate90 | float(0) %}

          {%- if k_pv > 0 %}
            {%- set adjusted_pv = p50 + (p90 - p50) * k_pv %}
          {%- else %}
            {%- set adjusted_pv = p50 - (p50 - p10) * (k_pv | abs) %}
          {%- endif %}
          
          {%- set v = (adjusted_pv * 1000) | int %}
          {%- if v > 0 %}
            {%- set pv_forecast_gross.values = pv_forecast_gross.values + [v] %}
          {%- else %}
            {%- set pv_forecast_gross.values = pv_forecast_gross.values + [0] %}
          {%- endif %}
        {%- endfor %}

        {# 2. Get GROSS Load Forecast #}
        {%- set load_forecast_gross = state_attr('sensor.ai_load_forecast_high', 'forecasts')| map(attribute='power_load')|map('multiply', 1.0)|map('round',0)|list %}

        {# 3. Apply the "140W Logic" to create NET Forecasts #}
        {#    PV pays 140W first. If PV < 140, the remainder is added to Load. #}
        {%- set data = namespace(pv_net=[], load_net=[]) %}
        {%- set fixed_loss = 140 %}
        
        {#- Ensure we iterate only up to the length of the shortest list (usually matched, but safe to check) #}
        {%- set loop_len = [pv_forecast_gross.values | length, load_forecast_gross | length] | min %}
        
        {%- for i in range(loop_len) %}
            {%- set p_gross = pv_forecast_gross.values[i] %}
            {%- set l_gross = load_forecast_gross[i] %}
            
            {# Logic: Subtract Loss from PV. #}
            {%- set p_net = [0, p_gross - fixed_loss] | max %}
            
            {# Logic: If PV couldn't pay the full tax, add the remainder to Load #}
            {%- set uncovered_loss = [0, fixed_loss - p_gross] | max %}
            {%- set l_net = l_gross + uncovered_loss %}
            
            {%- set data.pv_net = data.pv_net + [p_net | int] %}
            {%- set data.load_net = data.load_net + [l_net | int] %}
        {%- endfor %}

        "pv_power_forecast": {{ data.pv_net | tojson }},
        "load_power_forecast": {{ data.load_net | tojson }},

        {#- ========================================================================================= #}
        {#-            START: DAY-AHEAD TWO-KNOB DYNAMIC PRICING LOGIC                    -#}
        {#- ========================================================================================= #}

        {#- Knob 1: Get the risk aversion factor 'k' from your input helper (-1.0 to 1.0) #}
        {%- set k_buy = states('input_number.emhass_weight_buy_forecast') | float(0) %}
        {%- set k_sell = states('input_number.emhass_weight_sell_forecast') | float(0) %}

        {#- Knob 2 is not used in this section but left for context #}
        {%- set discharge_weight = states('input_number.emhass_weight_battery_discharge') | float(0.02) %}

        {#- Prepare empty lists to store the new forecasts. #}
        {%- set data = namespace(load_cost_list=[], prod_price_list=[], weight_charge_list=[]) %}

        {#- Get the current allowance state ONCE before the loop. #}
        {%- set current_allowance = states('input_number.sapn_free_exports') | float(0) %}

        {%- set ai_load_forecasts = state_attr('sensor.ai_dh_import_price_forecast', 'forecast') | default([], true) %}
        {%- set ai_prod_forecasts = state_attr('sensor.ai_dh_export_price_forecast', 'forecast') | default([], true) %}
        {%- set use_ai_dh_prices = is_state('input_select.emhass_dh_price_source', 'ai_shadow') and ai_load_forecasts | count >= 144 and ai_prod_forecasts | count >= 144 %}

        {%- if use_ai_dh_prices %}
          {#- Canonical AI source: positive import cost, positive export revenue, UTC timestamps. #}
          {%- set loop_len = [ai_load_forecasts | count, ai_prod_forecasts | count, 144] | min %}
          {%- for i in range(loop_len) %}
            {%- set buy_price = ai_load_forecasts[i].native_value | float(0) %}
            {%- set sell_price = ai_prod_forecasts[i].native_value | float(0) %}
            {%- set forecast_time_local = as_local(as_datetime(ai_load_forecasts[i].datetime)) %}

            {%- if 10 <= forecast_time_local.hour < 16 and current_allowance > 0 %}
              {%- set final_sell_price = sell_price + 0.01 %}
            {%- else %}
              {%- set final_sell_price = sell_price %}
            {%- endif %}

            {%- set data.load_cost_list = data.load_cost_list + [buy_price | round(4)] %}
            {%- set data.prod_price_list = data.prod_price_list + [final_sell_price | round(4)] %}

            {#- --- Process Dynamic BATTERY CHARGE WEIGHT --- #}
            {#- Use END of period time. Add 30 minutes to start time. #}
            {%- set end_time = forecast_time_local + timedelta(minutes=30) %}
            {%- set m = end_time.hour * 60 + end_time.minute %}

            {%- if 930 < m <= 1260 %}
               {%- set w_charge = 0.0120 * ((m - 930) / 330) %}
            {%- else %}
               {%- set w_charge = 0.0 %}
            {%- endif %}
            {%- set data.weight_charge_list = data.weight_charge_list + [w_charge | round(5)] %}
          {%- endfor %}
        {%- else %}
          {#- Legacy source: APF-derived p50/low/high forecasts with user quantile knobs. #}
          {%- set p50_forecasts = state_attr('sensor.ai_price_forecast', 'forecasts') %}
          {%- set low_forecasts = state_attr('sensor.ai_price_forecast_low', 'forecasts') %}
          {%- set high_forecasts = state_attr('sensor.ai_price_forecast_high', 'forecasts') %}

          {#- Loop through the forecasts by index to process them in parallel. #}
          {%- for i in range(p50_forecasts | length) %}

            {#- --- Process BUY Price (load_cost) --- #}
            {%- set p50_buy = p50_forecasts[i].general_price %}
            {%- set high_buy = high_forecasts[i].general_price %}
            {%- set low_buy = low_forecasts[i].general_price %}
            
            {%- if k_buy > 0 %}
              {%- set adjusted_buy_price = p50_buy + (high_buy - p50_buy) * k_buy %}
            {%- else %}
              {%- set adjusted_buy_price = p50_buy - (p50_buy - low_buy) * (k_buy | abs) %}
            {%- endif %}
            {%- set data.load_cost_list = data.load_cost_list + [adjusted_buy_price | round(4)] %}

            {#- --- Process SELL Price (prod_price) --- #}
            {%- set p50_sell = p50_forecasts[i].feed_in_price %}
            {%- set high_sell = high_forecasts[i].feed_in_price %}
            {%- set low_sell = low_forecasts[i].feed_in_price %}

            {%- if k_sell > 0 %}
              {#- Positive weight blends towards optimistic (higher) feed-in price #}
              {%- set adjusted_sell_price = p50_sell + (high_sell - p50_sell) * k_sell %}
            {%- else %}
              {#- Negative weight blends towards pessimistic (lower) feed-in price #}
              {%- set adjusted_sell_price = p50_sell - (p50_sell - low_sell) * (k_sell | abs) %}
            {%- endif %}
            
            {#- Adjust for DNSP free tier #}
            {%- set forecast_time_local = as_local(as_datetime(p50_forecasts[i].timestamp)) %}
            {%- if 10 <= forecast_time_local.hour < 16 and current_allowance > 0 %}
              {%- set final_sell_price = adjusted_sell_price + 0.01 %}
            {%- else %}
              {%- set final_sell_price = adjusted_sell_price %}
            {%- endif %}

            {%- set data.prod_price_list = data.prod_price_list + [final_sell_price | round(4)] %}

            {#- --- Process Dynamic BATTERY CHARGE WEIGHT --- #}
            {#- 00:00-15:29 = 0.0 | 15:30-20:59 = Ramp 0->0.012 | 21:00-23:59 = 0.0 #}
            {#- REVERT to 15:45: change 930->945 and 330->315 #}
            {#- REVERT to 16:00: change 930->960 and 330->300 #}
            {#- Use END of period time. Add 30 minutes to start time. #}
            {%- set end_time = forecast_time_local + timedelta(minutes=30) %}
            {%- set m = end_time.hour * 60 + end_time.minute %}

            {#- 15:30 is 930. 21:00 is 1260. Window is 330 mins. #}
            {#- We use > 930 so the 15:30-16:00 block picks up an initial weight. #}
            {#- We use <= 1260 because 21:00 exactly (end of 20:30-21:00) is the peak of the ramp. #}
            {%- if 930 < m <= 1260 %}
               {%- set w_charge = 0.0120 * ((m - 930) / 330) %}
            {%- else %}
               {%- set w_charge = 0.0 %}
            {%- endif %}
            {%- set data.weight_charge_list = data.weight_charge_list + [w_charge | round(5)] %}

          {%- endfor %}
        {%- endif %}

        "load_cost_forecast": {{ data.load_cost_list | tojson }},
        "prod_price_forecast": {{ data.prod_price_list | tojson }},
        "weight_battery_discharge": {{ discharge_weight }},
        "weight_battery_charge": {{ data.weight_charge_list | tojson }},

        {#- ========================================================================================= #}
        {#-             END: DAY-AHEAD TWO-KNOB DYNAMIC PRICING LOGIC                     -#}
        {#- ========================================================================================= #}
        
        {#- 72h #}
        "delta_forecast_daily": 3,
        "optimization_time_step": 30,
        "prediction_horizon": 144,
        "battery_nominal_energy_capacity": {{ (1000.0*(states('sensor.sigen_plant_rated_energy_capacity')|float(0) * (states('sensor.sigen_plant_battery_state_of_health')|float()/100.0))) | int() }},
        "battery_minimum_state_of_charge": {{ (states('input_number.battery_soc_min_target') | float)/100 }}, 
        "soc_init": {{ ((states('input_number.battery_soc_30_minute') | float) / 100) | round(4) }},
        {#- Step 1: Get the current SOC and the stored offset. #}
        {%- set current_soc = states('input_number.battery_soc_30_minute') | float %}
        {%- set target_soc_offset = states('input_number.emhass_target_soc_offset') | float(0) %}
        
        {#- Step 2: Calculate the target SOC by adding the offset. #}
        {%- set final_soc_percentage = current_soc + target_soc_offset %}

        {#- Step 3: Clamp the final SOC between min_soc, 100% and set it. #}
        "soc_final": {{ (([states('input_number.battery_soc_min_target') | float, final_soc_percentage, 100] | sort)[1] / 100) | round(4) }}
      }

  emhass_publish_data_dh:
    url: !secret emhass_url_publish
    method: POST
    headers:
      content-type: application/json
    payload: >-
      {
        "publish_prefix":"dh"
      }

  emhass_mpc:
    url: !secret emhass_url_optim
    method: POST
    timeout: 120
    headers:
      content-type: application/json
    payload: >-
      {
        "entity_save": true,
        "publish_prefix":"mpc_",
        
        {#- Modded soc_init: If 100%, report 1.0. Else, subtract 0.20% offset to force charging. #}
        {%- set real_soc = states('input_number.battery_soc_5_minute') | float(0) %}
        "soc_init": {{ (1.0 if real_soc >= 100 else ([0, real_soc - 0.20] | max / 100)) | round(4) }},

        {# ========================================================================================= #}
        {#               1. INITIAL VARIABLE SETUP & ASYMMETRICAL FLOATING TARGET                    #}
        {# ========================================================================================= #}
        {%- set utc_now = utcnow() %}
        {%- set dayahead_forecasts = state_attr('sensor.dh_soc_batt_forecast', 'battery_scheduled_soc') %}
        
        {#- Note: We keep the raw actual SOC here for accurate deviation calculations #}
        {%- set actual_soc_now = states('input_number.battery_soc_5_minute') | float %}
        
        {%- set quantized_now = utc_now.replace(minute = (utc_now.minute // 5) * 5, second=0, microsecond=0) %}
        {%- set initial_soc_value = states('input_number.battery_soc_30_minute') | float %}
        {%- set plan_start_time = as_datetime(dayahead_forecasts[0].date) %}
        {%- set initial_soc_point = {'date': plan_start_time.isoformat(), 'dh_soc_batt_forecast': initial_soc_value} %}
        {%- set corrected_forecast_builder = namespace(points=[]) %}
        {%- for item in dayahead_forecasts %}
          {%- set value_time = as_datetime(item.date) + timedelta(minutes=30) %}
          {%- set corrected_point = {'date': value_time.isoformat(), 'dh_soc_batt_forecast': item.dh_soc_batt_forecast} %}
          {%- set corrected_forecast_builder.points = corrected_forecast_builder.points + [corrected_point] %}
        {%- endfor %}
        {%- set complete_soc_forecasts = [initial_soc_point] + corrected_forecast_builder.points %}
        {%- macro get_planned_soc(target_time, forecasts, fallback_soc) -%}
          {%- set p = namespace(start=none, end=none, start_time=none, end_time=none) %}
          {%- for item in forecasts %}
            {%- set item_time = as_datetime(item.date) %}
            {%- if item_time <= target_time -%}
              {%- set p.start = item.dh_soc_batt_forecast | float %}
              {%- set p.start_time = item_time %}
            {%- elif p.end == none -%}
              {%- set p.end = item.dh_soc_batt_forecast | float %}
              {%- set p.end_time = item_time %}
            {%- endif %}
          {%- endfor %}
          {%- if p.start == none and p.end == none %}{{ fallback_soc }}
          {%- elif p.start == none %}{{ p.end }}
          {%- elif p.end == none %}{{ p.start }}
          {%- else %}
            {%- set total_seconds = (p.end_time - p.start_time).total_seconds() %}
            {%- if total_seconds > 0 %}
              {%- set elapsed_seconds = (target_time - p.start_time).total_seconds() %}
              {%- set factor = elapsed_seconds / total_seconds %}
              {{ p.start * (1 - factor) + p.end * factor }}
            {%- else %}
              {{ p.start }}
            {%- endif %}
          {%- endif %}
        {%- endmacro -%}
        {%- set future_target_time = quantized_now + timedelta(hours=14) %}
        {%- set planned_soc_future = get_planned_soc(future_target_time, complete_soc_forecasts, actual_soc_now) | float %}
        {%- set planned_soc_now = get_planned_soc(quantized_now, complete_soc_forecasts, actual_soc_now) | float %}
        {# Disable historical +0.5% ahead-of-plan bias while investigating MPC/DH hierarchy. #}
        {%- set ahead_of_plan_bias_pct = 0.0 %}
        {%- set deviation = (actual_soc_now - planned_soc_now) + ahead_of_plan_bias_pct %}
        {%- set positive_deviation_only = [deviation, 0] | max %}
        {%- set final_soc_percent = planned_soc_future + positive_deviation_only %}
        "soc_final": {{ ([([final_soc_percent, 100.0] | min), 0.0] | max / 100) | round(4) }},
        "battery_nominal_energy_capacity": {{ (1000.0*(states('sensor.sigen_plant_rated_energy_capacity')|float(0) * (states('sensor.sigen_plant_battery_state_of_health')|float()/100.0))) | int() }},
        "battery_minimum_state_of_charge": {{ ([0, (states('input_number.battery_soc_5_minute') | float) - (states('input_number.battery_soc_min_buffer') | float), (states('input_number.battery_soc_min_target') | float)] | sort)[1]/100 | round(4) }},
        {#- "set_nodischarge_to_grid": {{ 'false' if actual_soc_now < (states('input_number.battery_soc_min_export') | float) else 'false' }}, #}

        {# ========================================================================================= #}
        {#               2. ADVANCED ENERGY CONSERVATION SCALING (Corrected)                         #}
        {# ========================================================================================= #}
        {%- set start_of_this_30min_block = utc_now.replace(minute=(utc_now.minute // 30) * 30, second=0, microsecond=0) %}

        {%- macro interpolate_power_data(entity_id, attribute_name, value_key, start_time) -%}
          {%- set d = namespace(thirty_min_values=[], initial_smooth_values=[], final_power_list=[]) %}
          {%- for item in state_attr(entity_id, attribute_name) | default([]) %}
            {%- if as_datetime(item.date) >= start_time %}
              {%- set d.thirty_min_values = d.thirty_min_values + [item[value_key] | int(0)] %}
            {%- endif %}
          {%- endfor %}
          {%- set num_periods = d.thirty_min_values | length %}
          {%- if num_periods > 0 -%}
            {%- for period_idx in range(num_periods) %}
              {%- set current_power = d.thirty_min_values[period_idx] %}
              {%- set prev_power = d.thirty_min_values[period_idx - 1] if period_idx > 0 else current_power %}
              {%- set next_power = d.thirty_min_values[period_idx + 1] if period_idx < (num_periods - 1) else current_power %}
              {%- set start_value = (prev_power + current_power) / 2.0 %}
              {%- set end_value = (current_power + next_power) / 2.0 %}
              {%- for i in range(6) %}
                {%- set t = (i + 0.5) / 6.0 %}
                {%- set interpolated_point = start_value + t * (end_value - start_value) %}
                {%- set d.initial_smooth_values = d.initial_smooth_values + [interpolated_point] %}
              {%- endfor %}
            {%- endfor %}
            {%- for period_idx in range(num_periods) %}
              {%- set target_average = d.thirty_min_values[period_idx] %}
              {%- set current_block = d.initial_smooth_values[period_idx*6:(period_idx+1)*6] %}
              {%- set residual_error = target_average - (current_block | sum / 6.0) %}
              {%- for value in current_block %}
                {%- set corrected_value = value + residual_error %}
                {%- set final_value = [0, corrected_value | round(0)] | max | int %}
                {%- set d.final_power_list = d.final_power_list + [final_value] %}
              {%- endfor %}
            {%- endfor %}
          {%- endif -%}
          {{- d.final_power_list | tojson }}
        {%- endmacro -%}
        {%- macro simple_interpolate_power_data(entity_id, attribute_name, value_key, start_time, periods_passed) -%}
          {%- set d = namespace(final_list=[], is_first_block=true) %}
          {%- for item in state_attr(entity_id, attribute_name) | default([]) %}
            {%- if as_datetime(item.date) >= start_time %}
              {%- set value = item[value_key] | int(0) %}
              {%- if d.is_first_block %}
                {%- for i in range(periods_passed, 6) %}
                  {%- set d.final_list = d.final_list + [value] %}
                {%- endfor %}
                {%- set d.is_first_block = false %}
              {%- else %}
                {%- for i in range(6) %}
                  {%- set d.final_list = d.final_list + [value] %}
                {%- endfor %}
              {%- endif %}
            {%- endif %}
          {%- endfor %}
          {{- d.final_list | tojson }}
        {%- endmacro -%}
        {%- macro scale_and_clamp_forecast(mpc_list, dh_entity, dh_value_key, periods_passed, start_time) -%}
          {%- set aligned_dh_list = simple_interpolate_power_data(dh_entity, 'forecasts', dh_value_key, start_time, periods_passed) | from_json %}
          {%- set target_total_energy = (aligned_dh_list[:168] | sum) %}
          {%- set current_total_energy = (mpc_list | sum) %}
          {%- set energy_error = target_total_energy - current_total_energy %}
          {%- set forecast_part_list = mpc_list[2:] %}
          {%- set forecast_part_energy = (forecast_part_list | sum) %}
          {%- set data = namespace(adjusted_part=[], rounding_residual=0.0) %}
          {%- for value in forecast_part_list %}
            {%- set new_value = value %}
            {%- if forecast_part_energy > 0 %}
              {%- set proportional_adjustment = energy_error * (value / forecast_part_energy) %}
              {%- set total_adjustment_needed = proportional_adjustment + data.rounding_residual %}
              {%- set rounded_adjustment = total_adjustment_needed | round(0) | int %}
              {%- set new_value = value + rounded_adjustment %}
              {%- set data.rounding_residual = total_adjustment_needed - rounded_adjustment %}
            {%- endif %}
            {%- set data.adjusted_part = data.adjusted_part + [[0, new_value | int] | max] %}
          {%- endfor %}
          {{ (mpc_list[:2] + data.adjusted_part) | tojson }}
        {%- endmacro -%}

        {# ========================================================================================= #}
        {#               3. DYNAMIC PRICE FORECASTING & FINAL PARAMETERS                           #}
        {# ========================================================================================= #}
        {%- set load_cost_now = states('sensor.amber_5min_current_general_price') | float(0) %}
        {%- set prod_price_now = states('sensor.amber_5min_current_feed_in_price') | float(0) %}
        
        {#- Adjust CURRENT price for DNSP allowance #}
        {%- set current_allowance = states('input_number.sapn_free_exports') | float(0) %}
        {%- set current_time_local = now() %}

        {%- if 10 <= current_time_local.hour < 16 and current_allowance > 0 %}
          {%- set adjusted_prod_price_now = prod_price_now + 0.01 %}
        {%- else %}
          {%- set adjusted_prod_price_now = prod_price_now %}
        {%- endif %}
        
        {#- --- CONFIGURATION: Relative Panic Curve --- #}
        {#- REVERT to 15:45: change 330->315 and 930->945 #}
        {#- REVERT to 16:00: change 330->300 and 930->960 #}
        {%- set slope = 0.0120 / 330 %}   {# Max cost / Duration in mins #}
        {%- set win_start = 930 %}        {# 15:30 #}
        {%- set win_end = 1260 %}         {# 21:00 #}
        
        {#- Calculate NOW (minutes from midnight, end of current 5min block) #}
        {%- set snapped_minute = (current_time_local.minute // 5) * 5 %}
        {%- set start_of_period = current_time_local.replace(minute=snapped_minute, second=0, microsecond=0) %}
        {%- set end_of_period = start_of_period + timedelta(minutes=5) %}
        {%- set m_now = end_of_period.hour * 60 + end_of_period.minute %}
        
        {#- Dynamic Start: The ramp starts at 16:00 OR Now, whichever is later. #}
        {#- This ensures the cost at 'Now' is always 0, preventing disincentive to charge immediately. #}
        {%- set ramp_start = [win_start, m_now] | max %}
        
        {#- Calculate Weight for NOW (Always 0 based on logic above) #}
        {#- But we keep the check for safety to ensure we don't return negative numbers #}
        {%- if ramp_start < m_now <= win_end %}
           {%- set w_charge_now = (m_now - ramp_start) * slope %}
        {%- else %}
           {%- set w_charge_now = 0.0 %}
        {%- endif %}
        
        {#- Initialize the lists with the correctly adjusted CURRENT price and CURRENT weight #}
        {%- set data = namespace(load_cost_list=[load_cost_now], prod_price_list=[adjusted_prod_price_now], weight_charge_list=[w_charge_now]) %}

        {#- Get the weights which now range from -1.0 to 1.0 #}
        {%- set k_buy = states('input_number.emhass_weight_buy_forecast') | float(0) %}
        {%- set k_sell = states('input_number.emhass_weight_sell_forecast') | float(0) %}

        {%- set ai_mpc_import_forecasts = state_attr('sensor.ai_mpc_import_price_forecast', 'forecast') | default([], true) %}
        {%- set ai_mpc_export_forecasts = state_attr('sensor.ai_mpc_export_price_forecast', 'forecast') | default([], true) %}
        {%- set use_ai_mpc_prices = is_state('input_select.emhass_mpc_price_source', 'ai_shadow') and ai_mpc_import_forecasts | count >= 168 and ai_mpc_export_forecasts | count >= 168 %}

        {#- Loop for BUY price forecast #}
        {%- if use_ai_mpc_prices %}
          {#- Canonical AI source: positive import cost, UTC datetime field. No APF blending — AI
              provides its own optimised price. Current interval stays from the confirmed Amber price. #}
          {%- for item in ai_mpc_import_forecasts %}
            {%- if as_datetime(item.datetime) > utcnow() %}
              {%- set data.load_cost_list = data.load_cost_list + [item.native_value | float(0) | round(4)] %}
              {%- set forecast_start = as_local(as_datetime(item.datetime)) %}
              {%- set forecast_end = forecast_start + timedelta(minutes=5) %}
              {%- set m = forecast_end.hour * 60 + forecast_end.minute %}
              {%- if ramp_start < m <= win_end %}
                {%- set w_charge = (m - ramp_start) * slope %}
              {%- else %}
                {%- set w_charge = 0.0 %}
              {%- endif %}
              {%- set data.weight_charge_list = data.weight_charge_list + [w_charge | round(5)] %}
            {%- endif %}
          {%- endfor %}
        {%- else %}
          {#- Legacy Amber source: APF p50/high/low with user quantile knobs. #}
          {%- for item in state_attr('sensor.amber_5min_forecasts_extended_general_price', 'Forecasts') %}
            {%- if as_datetime(item.start_time) > utcnow() %}
              {%- set p50 = item.advanced_price_predicted %}
              {%- set high = item.advanced_price_high %}
              {%- set low = item.advanced_price_low %}

              {%- if k_buy > 0 %}
                {%- set adjusted_buy_price = p50 + (high - p50) * k_buy %}
              {%- else %}
                {%- set adjusted_buy_price = p50 - (p50 - low) * (k_buy | abs) %}
              {%- endif %}

              {%- if (as_datetime(item.start_time) - utcnow()) < timedelta(minutes=5) %}
                {%- set final_buy_price = [adjusted_buy_price, item.per_kwh] | max %}
              {%- else %}
                {%- set final_buy_price = adjusted_buy_price %}
              {%- endif %}

              {%- set data.load_cost_list = data.load_cost_list + [final_buy_price | round(4)] %}

              {%- set forecast_start = as_local(as_datetime(item.start_time)) %}
              {%- set forecast_end = forecast_start + timedelta(minutes=5) %}
              {%- set m = forecast_end.hour * 60 + forecast_end.minute %}
              {%- if ramp_start < m <= win_end %}
                {%- set w_charge = (m - ramp_start) * slope %}
              {%- else %}
                {%- set w_charge = 0.0 %}
              {%- endif %}
              {%- set data.weight_charge_list = data.weight_charge_list + [w_charge | round(5)] %}
            {%- endif %}
          {%- endfor %}
        {%- endif %}

        {#- Loop for SELL price forecast #}
        {%- set current_allowance = states('input_number.sapn_free_exports') | float(0) %}
        {%- if use_ai_mpc_prices %}
          {#- Canonical AI source: positive export revenue. Apply DNSP free tier only. #}
          {%- for item in ai_mpc_export_forecasts %}
            {%- if as_datetime(item.datetime) > utcnow() %}
              {%- set sell_price = item.native_value | float(0) %}
              {%- set forecast_time_local = as_local(as_datetime(item.datetime)) %}
              {%- if 10 <= forecast_time_local.hour < 16 and current_allowance > 0 %}
                {%- set final_sell_price = sell_price + 0.01 %}
              {%- else %}
                {%- set final_sell_price = sell_price %}
              {%- endif %}
              {%- set data.prod_price_list = data.prod_price_list + [final_sell_price | round(4)] %}
            {%- endif %}
          {%- endfor %}
        {%- else %}
          {#- Legacy Amber source: APF-derived p50/high/low with user quantile knobs. #}
          {%- for item in state_attr('sensor.amber_5min_forecasts_extended_feed_in_price', 'Forecasts') %}
            {%- if as_datetime(item.start_time) > utcnow() %}
              {%- set p50  = -item.advanced_price_predicted %}
              {%- set high = -item.advanced_price_high %}
              {%- set low  = -item.advanced_price_low %}

              {%- if k_sell > 0 %}
                {%- set adjusted_sell_price = p50 + (high - p50) * k_sell %}
              {%- else %}
                {%- set adjusted_sell_price = p50 - (p50 - low) * (k_sell | abs) %}
              {%- endif %}

              {%- if (as_datetime(item.start_time) - utcnow()) < timedelta(minutes=5) %}
                {%- set final_sell_price_before_dnsp = [adjusted_sell_price, -item.per_kwh] | min %}
              {%- else %}
                {%- set final_sell_price_before_dnsp = adjusted_sell_price %}
              {%- endif %}

              {%- set forecast_time_local = as_local(as_datetime(item.start_time)) %}
              {%- if 10 <= forecast_time_local.hour < 16 and current_allowance > 0 %}
                {%- set final_sell_price = final_sell_price_before_dnsp + 0.01 %}
              {%- else %}
                {%- set final_sell_price = final_sell_price_before_dnsp %}
              {%- endif %}

              {%- set data.prod_price_list = data.prod_price_list + [final_sell_price | round(4)] %}
            {%- endif %}
          {%- endfor %}
        {%- endif %}
        
        "load_cost_forecast": {{ data.load_cost_list[:168] | tojson }},
        "prod_price_forecast": {{ data.prod_price_list[:168] | tojson }},
        "weight_battery_charge": {{ data.weight_charge_list[:168] | tojson }},

        {# ========================================================================================= #}
        {#      START: PREPARE NET CURRENT VALUES & COMBINE WITH NET FORECAST                        #}
        {# ========================================================================================= #}
        
        {# 1. Get current GROSS values from sensors. #}
        {%- set gross_pv_now = states('sensor.sigen_power_pv_gross') | int(0) %}
        {%- set gross_load_now = states('sensor.sigen_plant_consumed_power') | int(0) %}
        {%- set total_inverter_losses = states('sensor.sigen_inverter_conversion_loss') | int(0) %}

        {# 2. Apply "140W Logic" to the Current timestep. #}
        {#    We use the logic max(140) to match the forecast logic, or you can use real sensor loss if preferred. #}
        {#    Using the fixed 140 logic ensures consistency with the forecast logic we added to DH. #}
        {%- set max_fixed_loss = 140 %}
        {%- set fixed_loss_to_account = [0, [total_inverter_losses, max_fixed_loss] | min] | max %}
        
        {%- set net_pv_now = [0, gross_pv_now - fixed_loss_to_account] | max %}
        {%- set uncovered_loss = [0, fixed_loss_to_account - gross_pv_now] | max %}
        {%- set net_load_now = gross_load_now + uncovered_loss %}

        {# 3. Handle Curtailment Override (on the Net PV value) #}
        {%- set pv_curtailment = namespace(value=(states('sensor.mpc_p_pv_curtailment') | float(0))) %}
        {%- for item in state_attr('sensor.mpc_p_pv_curtailment', 'forecasts') or [] %}
          {%- if as_datetime(item.date) <= utc_now %}
            {% set pv_curtailment.value = item.mpc_p_pv_curtailment %}
          {%- endif %}
        {%- endfor %}
        
        {# Check curtailment conditions #}
        {%- set load_cost_now = states('sensor.amber_5min_current_general_price') | float(0) %}
        {%- set actual_soc_now = states('input_number.battery_soc_5_minute') | float %}
        {%- set pv_currently_curtailed = (pv_curtailment.value | int(0) > 0) or (load_cost_now < 0) or (actual_soc_now >= 99.9) %}
        
        {%- if pv_currently_curtailed %}
          {# Solcast provides Gross, so we must apply the 140W subtraction to the Solcast Now estimate too #}
          {%- set k_pv = states('input_number.emhass_weight_pv_forecast') | float(0) %}
          {%- set p50_now = state_attr('sensor.solcast_pv_forecast_power_now', 'estimate') | float(0) %}
          {%- set p10_now = state_attr('sensor.solcast_pv_forecast_power_now', 'estimate10') | float(0) %}
          {%- set p90_now = state_attr('sensor.solcast_pv_forecast_power_now', 'estimate90') | float(0) %}

          {%- if k_pv > 0 %}
            {%- set solcast_now_gross = p50_now + (p90_now - p50_now) * k_pv %}
          {%- else %}
            {%- set solcast_now_gross = p50_now - (p50_now - p10_now) * (k_pv | abs) %}
          {%- endif %}

          {%- set solcast_now_net = [0, solcast_now_gross - fixed_loss_to_account] | max %}
          {%- set net_pv_now =[net_pv_now, solcast_now_net] | max %}
        {%- endif %}
        
        {# 4. Interpolate the Day-Ahead Forecasts (Which are ALREADY Net) #}
        {%- set periods_into_30min = (utc_now.minute % 30)//5 %}
        {%- set start_of_this_30min_block = utc_now.replace(minute=(utc_now.minute // 30) * 30, second=0, microsecond=0) %}

        {%- set dh_net_load_full = interpolate_power_data('sensor.dh_p_load_forecast', 'forecasts', 'dh_p_load_forecast', start_of_this_30min_block) | from_json %}
        {%- set dh_net_pv_full = interpolate_power_data('sensor.dh_p_pv_forecast', 'forecasts', 'dh_p_pv_forecast', start_of_this_30min_block) | from_json %}

        {# Slice to match MPC horizon #}
        {%- set dh_net_load_future = dh_net_load_full[periods_into_30min:][:168] %}
        {%- set dh_net_pv_future = dh_net_pv_full[periods_into_30min:][:168] %}

        {# 5. Construct the list: [Current Net] + [Future Net] #}
        {# Note: We duplicate 'now' for the first 2 steps as per your original template logic #}
        {%- set initial_mpc_load = [net_load_now]*2 + dh_net_load_future[2:] %}
        {%- set initial_mpc_pv = [net_pv_now]*2 + dh_net_pv_future[2:] %}

        {# 6. Run scaling (Net vs Net) #}
        {%- set final_load_forecast = scale_and_clamp_forecast(initial_mpc_load, 'sensor.dh_p_load_forecast', 'dh_p_load_forecast', periods_into_30min, start_of_this_30min_block) | from_json %}
        {%- set final_pv_forecast = scale_and_clamp_forecast(initial_mpc_pv, 'sensor.dh_p_pv_forecast', 'dh_p_pv_forecast', periods_into_30min, start_of_this_30min_block) | from_json %}
        "load_power_forecast": {{ final_load_forecast | tojson }},
        "pv_power_forecast": {{ final_pv_forecast | tojson }},
        
        "weight_battery_discharge": {{ states('input_number.emhass_weight_battery_discharge') | float }},
        {#- up to 24h, actually 14h #}
        "delta_forecast_daily": 1,
        "optimization_time_step": 5,
        "prediction_horizon": 168
      }

  emhass_publish_data_mpc:
    url: !secret emhass_url_publish
    method: POST
    headers:
      content-type: application/json
    payload: >-
      {
        "publish_prefix":"mpc"
      }


  emhass_publish_data_all:
    url: !secret emhass_url_publish
    method: POST
    headers:
      content-type: application/json
    payload: >-
      {
        "publish_prefix":"all"
      }

  emhass_action_naive_mpc_optim:
    url: !secret emhass_url_optim
    method: POST
    content_type: "application/json"
    timeout: 240
    payload: "{{ payload }}"

  emhass_action_publish_data:
    url: !secret emhass_url_publish
    method: POST
    content_type: "application/json"
    timeout: 240
    payload: "{{ payload }}"
