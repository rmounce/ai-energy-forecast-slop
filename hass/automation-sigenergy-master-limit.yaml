alias: Sigen Master Limit Controller
description: >-
  External-event handler for the Sigen grid/PCS limits. Captures externally-imposed
  SAPN flexible export limits into input_number.flexible_export_limit, then delegates
  ALL enforcement to script.sigen_apply_limits. Fires on register changes (to catch
  external/SAPN writes and the SAPN >4e6 import bug), desired_* helper changes (so
  manual edits and the export ramp-hold's transient_pcs_export_cap propagate to
  hardware), Amber price changes, and a periodic failsafe. The actual register writes
  live in script.sigen_apply_limits, which is also called synchronously by
  script.configure_sigen_ems_state for deterministic Modbus ordering. Export-register
  changes caused by HA service calls are never captured as SAPN limits; queued echoes
  from our own earlier writes can otherwise poison flexible_export_limit.
triggers:
  - trigger: state
    entity_id: number.sigen_plant_grid_import_limitation
    id: import_limit_update
  - trigger: state
    entity_id: number.sigen_plant_grid_export_limitation
    id: export_limit_update
  - trigger: state
    entity_id: number.sigen_plant_pcs_import_limitation
    id: pcs_import_limit_update
  - trigger: state
    entity_id: number.sigen_plant_pcs_export_limitation
    id: pcs_export_limit_update
  - trigger: state
    entity_id: input_number.desired_export_limit
    id: desired_export_update
  - trigger: state
    entity_id: input_number.desired_import_limit
    id: desired_import_update
  - trigger: state
    entity_id: input_number.desired_pcs_export_limit
    id: desired_pcs_export_update
  - trigger: state
    entity_id: input_number.desired_pcs_import_limit
    id: desired_pcs_import_update
  - trigger: state
    entity_id: input_number.transient_pcs_export_cap
    id: transient_pcs_export_update
  - trigger: state
    entity_id: sensor.amber_effective_feed_in_price
    id: amber_price_update
  - trigger: time_pattern
    minutes: /5
    id: failsafe_check
actions:
  # Capture an externally-imposed (e.g. SAPN) grid export limit so apply can honour
  # it: only when the export register itself changed outside HA to a value that isn't
  # our sentinel (1.5) and differs from what we would otherwise command. HA-originated
  # writes carry a parent/user context; external inverter/SAPN writes should not.
  - variables:
      amber_limit: >-
        {{ 0 if states('sensor.amber_effective_feed_in_price') | float(0) <= 0 else 10 }}
      correct_export_limit: >-
        {{ [ states('input_number.desired_export_limit') | float(10),
             states('input_number.flexible_export_limit') | float(9.999),
             amber_limit ] | min }}
      export_update_is_external: >-
        {{ trigger is defined
           and trigger.id == 'export_limit_update'
           and trigger.to_state is defined
           and trigger.to_state is not none
           and trigger.to_state.context.parent_id is none
           and trigger.to_state.context.user_id is none }}
  - if:
      - condition: trigger
        id: export_limit_update
      - condition: template
        value_template: "{{ export_update_is_external }}"
      - condition: template
        value_template: >-
          {{ trigger.to_state is defined and trigger.to_state.state | float(0) not in [1.5] }}
      - condition: template
        value_template: >-
          {{ (trigger.to_state.state | float(0) - correct_export_limit) | abs > 0.001 }}
    then:
      - action: input_number.set_value
        target:
          entity_id: input_number.flexible_export_limit
        data:
          value: "{{ trigger.to_state.state }}"
  - action: script.sigen_apply_limits
mode: queued
max_exceeded: silent
trace:
  stored_traces: 10
