alias: Configure Sigen EMS State
description: Sets desired state helpers and other key Sigen EMS parameters.
fields:
  control_mode:
    name: Control Mode
    description: The remote EMS control mode.
    selector:
      select:
        options:
          - Maximum Self Consumption
          - Command Charging (PV First)
          - Command Charging (Grid First)
          - Command Discharging (PV First)
          - Standby
    default: Maximum Self Consumption
  export_limit_kw:
    name: Grid Export Limit (kW)
    description: The maximum power to export to the grid.
    selector:
      number:
        min: 0
        max: 10
    default: 10
  import_limit_kw:
    name: Grid Import Limit (kW)
    description: The maximum power to import from the grid.
    selector:
      number:
        min: 0
        max: 15
    default: 15
  pv_max_power_limit_kw:
    name: PV Max Power Limit (kW)
    description: The maximum power to generate from PV.
    selector:
      number:
        min: 0
        max: 100
    default: 100
  charge_limit_kw:
    name: Max Charging Limit (kW)
    description: The maximum power to charge the battery.
    selector:
      number:
        min: 0
        max: 21
    default: 21
  discharge_limit_kw:
    name: Max Discharging Limit (kW)
    description: The maximum power to discharge the battery.
    selector:
      number:
        min: 0
        max: 24
    default: 24
  charge_cutoff_soc:
    name: Charge Cutoff SoC (%)
    description: The SoC at which to stop charging.
    selector:
      number:
        min: 0
        max: 100
    default: 100
  pcs_export_limit_kw:
    name: PCS Export Limit (kW)
    description: The maximum AC power the PCS can output.
    selector:
      number:
        min: 0
        max: 100
    default: 100
  pcs_import_limit_kw:
    name: PCS Import Limit (kW)
    description: The maximum AC power the PCS can input.
    selector:
      number:
        min: 0
        max: 100
    default: 100
sequence:
  - variables:
      v_export_limit: >-
        {{ export_limit_kw if export_limit_kw is defined and export_limit_kw not
        in [none, ''] else 10 }}
      v_import_limit: >-
        {{ import_limit_kw if import_limit_kw is defined and import_limit_kw not
        in [none, ''] else 15 }}
      v_control_mode: >-
        {{ control_mode if control_mode is defined and control_mode not in
        [none, ''] else 'Maximum Self Consumption' }}
      v_pv_max_power_limit: >-
        {{ pv_max_power_limit_kw if pv_max_power_limit_kw is defined and
        pv_max_power_limit_kw not in [none, ''] else 100 }}
      v_charge_limit: >-
        {{ charge_limit_kw if charge_limit_kw is defined and charge_limit_kw not
        in [none, ''] else 21 }}
      v_discharge_limit: >-
        {{ discharge_limit_kw if discharge_limit_kw is defined and
        discharge_limit_kw not in [none, ''] else 24 }}
      v_charge_cutoff: >-
        {{ charge_cutoff_soc if charge_cutoff_soc is defined and
        charge_cutoff_soc not in [none, ''] else 100 }}
      v_pcs_export_limit: >-
        {{ pcs_export_limit_kw if pcs_export_limit_kw is defined and
        pcs_export_limit_kw not in [none, ''] else 100 }}
      v_pcs_import_limit: >-
        {{ pcs_import_limit_kw if pcs_import_limit_kw is defined and
        pcs_import_limit_kw not in [none, ''] else 100 }}
  - variables:
      # Current EMS mode and a flag for whether this call changes it. The
      # limit/mode race only exists across an actual mode transition.
      v_current_mode: "{{ states('select.sigen_plant_remote_ems_control_mode') }}"
      v_mode_changing: >-
        {{ v_control_mode != states('select.sigen_plant_remote_ems_control_mode') }}
      # Current hardware limit values, used to compute transition-safe minima.
      v_cur_export: "{{ states('number.sigen_plant_grid_export_limitation') | float(10) }}"
      v_cur_import: "{{ states('number.sigen_plant_grid_import_limitation') | float(15) }}"
      v_cur_pcs_export: "{{ states('number.sigen_plant_pcs_export_limitation') | float(100) }}"
      v_cur_pcs_import: "{{ states('number.sigen_plant_pcs_import_limitation') | float(100) }}"
      v_cur_charge: "{{ states('number.sigen_plant_ess_max_charging_limit') | float(21) }}"
      v_cur_discharge: "{{ states('number.sigen_plant_ess_max_discharging_limit') | float(24) }}"
      v_cur_pv: "{{ states('number.sigen_plant_pv_max_power_limit') | float(100) }}"
      v_amber_export_limit: >-
        {{ 0 if states('sensor.amber_effective_feed_in_price') | float(0) <= 0 else 10 }}
      v_effective_export_target: >-
        {{ [ v_export_limit | float,
             states('input_number.flexible_export_limit') | float(9.999),
             v_amber_export_limit | float ] | min }}
      # Transition-safe "lowered" values = min(current, target). Applied before
      # the mode flip so no limit is ever higher than both endpoints mid-flip.
      v_low_export: "{{ [v_cur_export | float, v_effective_export_target | float] | min }}"
      v_low_import: "{{ [v_cur_import, v_import_limit | float] | min }}"
      v_low_pcs_export: "{{ [v_cur_pcs_export, v_pcs_export_limit | float] | min }}"
      v_low_pcs_import: "{{ [v_cur_pcs_import, v_pcs_import_limit | float] | min }}"
      v_low_charge: "{{ [v_cur_charge, v_charge_limit | float] | min }}"
      v_low_discharge: "{{ [v_cur_discharge, v_discharge_limit | float] | min }}"
      v_low_pv: "{{ [v_cur_pv, v_pv_max_power_limit | float] | min }}"
      v_exporting_current_mode: >-
        {{ v_current_mode in ['Command Discharging (PV First)', 'Maximum Self Consumption'] }}
      v_exporting_target_mode: >-
        {{ v_control_mode in ['Command Discharging (PV First)', 'Maximum Self Consumption'] }}
      v_prearm_export_ramp: >-
        {{ (v_exporting_current_mode or v_exporting_target_mode)
           and (v_low_export | float) < ((v_cur_export | float) - 0.001) }}
      v_ramp_s: >-
        {{ [ (((v_cur_export | float) - (v_low_export | float)) * 1000 / 300 + 3) | round(0), 60 ] | min }}
      v_ramp_duration: "{{ '00:%02d:%02d' | format((v_ramp_s | int) // 60, (v_ramp_s | int) % 60) }}"
      v_command_settle_delay: "00:00:00.1"
      v_transition_pcs_export_cap: >-
        {{ [ ((states('sensor.sigen_inverter_active_power') | float(0))
              + (states('sensor.sigen_plant_grid_active_power') | float(0))
              + ((v_low_export | float) * 1000)) / 1000, 0 ] | max | round(3) }}
      v_safe_pcs_export_before_mode: >-
        {{ [v_low_pcs_export | float, v_transition_pcs_export_cap | float] | min
           if (v_prearm_export_ramp | bool) else v_low_pcs_export | float }}
  # Charge cutoff SoC is not a power limit (no burst risk), so it is set once
  # regardless of mode-change ordering.
  - target:
      entity_id: number.sigen_plant_ess_charge_cut_off_state_of_charge
    data:
      value: "{{ v_charge_cutoff }}"
    action: number.set_value
  # If this call reduces the effective grid-export limit, arm the PCS transient cap
  # before writing the grid-export register. Otherwise the export-ramp automation only
  # reacts after the decrease is visible, leaving a short window where Command
  # Discharging can run behind the old high PCS export limit.
  - if:
      - condition: template
        value_template: "{{ v_prearm_export_ramp | bool }}"
    then:
      - action: timer.start
        target:
          entity_id: timer.sigen_export_ramp
        data:
          duration: "{{ v_ramp_duration }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.transient_pcs_export_cap
        data:
          value: "{{ v_transition_pcs_export_cap }}"
  - if:
      - condition: template
        value_template: "{{ v_mode_changing }}"
    then:
      # Mode transition. Lower every limit to min(current, target), push to hardware
      # synchronously via script.sigen_apply_limits (deterministic Modbus ordering,
      # no waiting on the async controller), flip the mode, then raise to target and
      # apply again. The min-before-mode ordering protects the *instant* limits
      # (import / PCS / charge / discharge) entering their active modes; the export
      # burst is handled separately by automation-sigenergy-export-ramp-hold.yaml
      # (the grid export limit's internal ~300 W/s ramp).
      # --- Phase 1: lower ---
      - target:
          entity_id: input_number.desired_export_limit
        data:
          value: "{{ v_low_export }}"
        action: input_number.set_value
      - target:
          entity_id: input_number.desired_import_limit
        data:
          value: "{{ v_low_import }}"
        action: input_number.set_value
      - target:
          entity_id: input_number.desired_pcs_export_limit
        data:
          value: "{{ v_low_pcs_export }}"
        action: input_number.set_value
      - target:
          entity_id: input_number.desired_pcs_import_limit
        data:
          value: "{{ v_low_pcs_import }}"
        action: input_number.set_value
      - target:
          entity_id: number.sigen_plant_ess_max_charging_limit
        data:
          value: "{{ v_low_charge }}"
        action: number.set_value
      - target:
          entity_id: number.sigen_plant_ess_max_discharging_limit
        data:
          value: "{{ v_low_discharge }}"
        action: number.set_value
      - target:
          entity_id: number.sigen_plant_pv_max_power_limit
        data:
          value: "{{ v_low_pv }}"
        action: number.set_value
      # Synchronously push the lowered grid/PCS limits to hardware before the flip
      # (deterministic ordering; no waiting on the async controller).
      - action: script.sigen_apply_limits
      # Wait for the lowered hardware limits to be read back before the mode flip.
      # The PCS export check uses the pre-armed transient cap when this transition is
      # an export decrease; that is the actual burst-prevention limit.
      - wait_template: >-
          {{ states('number.sigen_plant_grid_export_limitation') | float(10) <= ((v_low_export | float) + 0.001)
             and states('number.sigen_plant_grid_import_limitation') | float(15) <= ((v_low_import | float) + 0.001)
             and states('number.sigen_plant_pcs_export_limitation') | float(100) <= ((v_safe_pcs_export_before_mode | float) + 0.001)
             and states('number.sigen_plant_pcs_import_limitation') | float(100) <= ((v_low_pcs_import | float) + 0.001) }}
        timeout: "00:00:02"
        continue_on_timeout: true
      # --- Phase 2: flip mode (all caps now at safe-low values) ---
      - target:
          entity_id: select.sigen_plant_remote_ems_control_mode
        data:
          option: "{{ v_control_mode }}"
        action: select.select_option
      # The select entity may be optimistic. Wait for readback when it is meaningful,
      # then always hold the lowered export/PCS limits for a short physical settle
      # window before raising targets. Without the fixed delay, an optimistic select
      # can let Phase 3 raise grid export back to ~10 kW while the inverter is still
      # physically in Command Discharging.
      - wait_template: >-
          {{ states('select.sigen_plant_remote_ems_control_mode') == v_control_mode }}
        timeout: "00:00:02"
        continue_on_timeout: true
      - delay: "{{ v_command_settle_delay }}"
      # --- Phase 3: raise limits to their targets, now in the final mode ---
      - target:
          entity_id: input_number.desired_export_limit
        data:
          value: "{{ v_export_limit }}"
        action: input_number.set_value
      - target:
          entity_id: input_number.desired_import_limit
        data:
          value: "{{ v_import_limit }}"
        action: input_number.set_value
      - target:
          entity_id: input_number.desired_pcs_export_limit
        data:
          value: "{{ v_pcs_export_limit }}"
        action: input_number.set_value
      - target:
          entity_id: input_number.desired_pcs_import_limit
        data:
          value: "{{ v_pcs_import_limit }}"
        action: input_number.set_value
      - target:
          entity_id: number.sigen_plant_ess_max_charging_limit
        data:
          value: "{{ v_charge_limit }}"
        action: number.set_value
      - target:
          entity_id: number.sigen_plant_ess_max_discharging_limit
        data:
          value: "{{ v_discharge_limit }}"
        action: number.set_value
      - target:
          entity_id: number.sigen_plant_pv_max_power_limit
        data:
          value: "{{ v_pv_max_power_limit }}"
        action: number.set_value
      # Synchronously push the target grid/PCS limits to hardware.
      - action: script.sigen_apply_limits
    else:
      # No mode transition: export decreases were pre-armed above; otherwise apply
      # every target directly.
      - target:
          entity_id: input_number.desired_export_limit
        data:
          value: "{{ v_export_limit }}"
        action: input_number.set_value
      - target:
          entity_id: input_number.desired_import_limit
        data:
          value: "{{ v_import_limit }}"
        action: input_number.set_value
      - target:
          entity_id: input_number.desired_pcs_export_limit
        data:
          value: "{{ v_pcs_export_limit }}"
        action: input_number.set_value
      - target:
          entity_id: input_number.desired_pcs_import_limit
        data:
          value: "{{ v_pcs_import_limit }}"
        action: input_number.set_value
      - target:
          entity_id: number.sigen_plant_ess_max_charging_limit
        data:
          value: "{{ v_charge_limit }}"
        action: number.set_value
      - target:
          entity_id: number.sigen_plant_ess_max_discharging_limit
        data:
          value: "{{ v_discharge_limit }}"
        action: number.set_value
      - target:
          entity_id: number.sigen_plant_pv_max_power_limit
        data:
          value: "{{ v_pv_max_power_limit }}"
        action: number.set_value
      - action: script.sigen_apply_limits
      - target:
          entity_id: select.sigen_plant_remote_ems_control_mode
        data:
          option: "{{ v_control_mode }}"
        action: select.select_option
mode: single
