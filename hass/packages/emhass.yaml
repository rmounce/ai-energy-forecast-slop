        {%- else %}
          not_ready
        {%- endif %}
      attributes:
        expected_count: 144
        interval_minutes: 30
        import_count: >
          {{ state_attr('sensor.ai_dh_import_price_forecast', 'forecast') | default([], true) | count }}
        export_count: >
          {{ state_attr('sensor.ai_dh_export_price_forecast', 'forecast') | default([], true) | count }}
        tier2_source_import: >
          {{ state_attr('sensor.ai_dh_import_price_forecast', 'tier2_source') | default(none, true) }}
        tier2_source_export: >
          {{ state_attr('sensor.ai_dh_export_price_forecast', 'tier2_source') | default(none, true) }}
        import_first_value: >
