input_select:
  # 2026-05-08: ai_shadow removed from EMHASS source-selector options per reviewer
  # call. Rationale: live visual shadowing (TFT/PD-direct triplet sensors) and
  # selectable EMHASS control are different risk surfaces. Leaving an option that
  # routes control to potentially-stale bundle entities is a foot-gun. Re-add when
  # there is a deliberate decision to make a controllable path. Dashboard sensors
  # continue publishing.
  emhass_mpc_price_source:
    name: EMHASS MPC Price Source
    options:
      - amber
    initial: amber

  emhass_dh_price_source:
    name: EMHASS DH Price Source
    options:
      - amber_lgbm_extrapolated
    initial: amber_lgbm_extrapolated

input_number:
  # soc_init values passed to the most recent DH / MPC EMHASS runs. Written by
  # script.emhass_dayahead_optim and script.emhass_mpc respectively. Used to
  # correctly anchor the prior plan when interpolating it (because the published
  # *_soc_batt_forecast entities only contain end-of-interval values — the start
  # anchor has to come from somewhere). mpc_last_soc_init has no current
  # consumer; it is published for diagnostics.
  dh_last_soc_init:
    name: EMHASS DH Last SoC Init
    min: 0
    max: 100
    step: 0.01
    unit_of_measurement: "%"
    icon: mdi:battery-sync

  mpc_last_soc_init:
    name: EMHASS MPC Last SoC Init
    min: 0
    max: 100
    step: 0.01
    unit_of_measurement: "%"
    icon: mdi:battery-sync

template:
  - sensor:
    - name: 'Amber Effective General Price'
      unit_of_measurement: "$/kWh"
      device_class: monetary
      state: >
        {% set ns = namespace(value='unknown') %}
        {% if as_datetime(state_attr('sensor.amber_5min_current_general_price', 'end_time')) > utcnow() %}
          {% set ns.value = states('sensor.amber_5min_current_general_price') %}
        {% else %}
          {% for item in state_attr('sensor.amber_5min_forecasts_general_price', 'Forecasts') %}
            {% if ns.value == 'unknown' and as_datetime(item.end_time) > utcnow() %}
              {% set weight = states('input_number.emhass_weight_buy_forecast') | float(0) %}
              {% set p50 = item.advanced_price_predicted %}
              {% set high = item.advanced_price_high %}
              {% set low = item.advanced_price_low %}

              {% if weight > 0 %}
                {% set adjusted_price = p50 + (high - p50) * weight %}
              {% else %}
                {% set adjusted_price = p50 - (p50 - low) * (weight | abs) %}
              {% endif %}
              
              {# Safeguard: Use the higher of the blended price or the raw per_kwh forecast #}
              {% set ns.value = [adjusted_price, item.per_kwh] | max %}
            {% endif %}
          {% endfor %}
        {% endif %}
        {{ ns.value | round(6) }}

    - name: 'Amber Effective Feed In Price'
      unit_of_measurement: "$/kWh"
      device_class: monetary
      state: >
        {% set ns = namespace(value='unknown') %}
        {% set base_price = 0 %}

        {# First, get the base price from either the current sensor or the next forecast #}
        {% if as_datetime(state_attr('sensor.amber_5min_current_feed_in_price', 'end_time')) > utcnow() %}
          {% set base_price = states('sensor.amber_5min_current_feed_in_price') | float(0) %}
        {% else %}
          {% for item in state_attr('sensor.amber_5min_forecasts_feed_in_price', 'Forecasts') %}
            {% if ns.value == 'unknown' and as_datetime(item.end_time) > utcnow() %}
              {% set weight = states('input_number.emhass_weight_sell_forecast') | float(0) %}

              {# Amber's feed-in prices are negative. We negate them to work with positive numbers. #}
              {% set p50  = -item.advanced_price_predicted %}
              {% set high = -item.advanced_price_high %}
              {% set low  = -item.advanced_price_low %}

              {% if weight > 0 %}
                {# Positive weight blends towards a more optimistic (higher) feed-in price #}
                {% set adjusted_price = p50 + (high - p50) * weight %}
              {% else %}
                {# Negative weight blends towards a more pessimistic (lower) feed-in price #}
                {% set adjusted_price = p50 - (p50 - low) * (weight | abs) %}
              {% endif %}
              
              {# Safeguard: Use the lower (more pessimistic) of the blended price or the raw per_kwh forecast #}
              {% set ns.value = [adjusted_price, -item.per_kwh] | min %}
            {% endif %}
          {% endfor %}
          {% set base_price = ns.value %}
        {% endif %}

        {# ================================================================= #}
        {#               START: DNSP FREE TIER ADJUSTMENT                    #}
        {# ================================================================= #}
        {% set final_base_price = base_price | float(0) %}
        {% set allowance = states('input_number.sapn_free_exports') | float(0) %}
        {% set current_hour = now().hour %}

        {# If we are in the 10am-4pm window AND have allowance, add 1c ($0.01) #}
        {% if 10 <= current_hour < 16 and allowance > 0 %}
          {{ (final_base_price + 0.01) | round(6) }}
        {% else %}
          {{ final_base_price | round(6) }}
        {% endif %}
        {# ================================================================= #}
        {#                END: DNSP FREE TIER ADJUSTMENT                     #}
        {# ================================================================= #}

    - name: 'EMHASS Selected MPC Price Source'
      state: "{{ states('input_select.emhass_mpc_price_source') }}"
      attributes:
        production_default: amber
        requested_source: "{{ states('input_select.emhass_mpc_price_source') }}"
        effective_source: >
          {%- set requested = states('input_select.emhass_mpc_price_source') %}
          {%- if requested == 'ai_shadow' and is_state('sensor.ai_mpc_price_forecast_status', 'ready') %}
            {{- 'ai_shadow' -}}
          {%- else %}
            {{- 'amber' -}}
          {%- endif %}
        fallback_reason: >
          {%- set requested = states('input_select.emhass_mpc_price_source') %}
          {%- if requested == 'ai_shadow' and not is_state('sensor.ai_mpc_price_forecast_status', 'ready') %}
            {{- 'ai_shadow_not_ready' -}}
          {%- elif requested != 'ai_shadow' %}
            {{- 'legacy_source_selected' -}}
          {%- else %}
            {{- 'none' -}}
          {%- endif %}
        ai_status: "{{ states('sensor.ai_mpc_price_forecast_status') }}"
        ai_tier2_source: "{{ state_attr('sensor.ai_mpc_import_price_forecast', 'tier2_source') | default(none, true) }}"
        ai_import_entity: sensor.ai_mpc_import_price_forecast
        ai_export_entity: sensor.ai_mpc_export_price_forecast

    - name: 'EMHASS Selected DH Price Source'
      state: "{{ states('input_select.emhass_dh_price_source') }}"
      attributes:
        production_default: amber_lgbm_extrapolated
        requested_source: "{{ states('input_select.emhass_dh_price_source') }}"
        effective_source: >
          {%- set requested = states('input_select.emhass_dh_price_source') %}
          {%- if requested == 'ai_shadow' and is_state('sensor.ai_dh_price_forecast_status', 'ready') %}
            {{- 'ai_shadow' -}}
          {%- else %}
            {{- 'amber_lgbm_extrapolated' -}}
          {%- endif %}
        fallback_reason: >
          {%- set requested = states('input_select.emhass_dh_price_source') %}
          {%- if requested == 'ai_shadow' and not is_state('sensor.ai_dh_price_forecast_status', 'ready') %}
            {{- 'ai_shadow_not_ready' -}}
          {%- elif requested != 'ai_shadow' %}
            {{- 'legacy_source_selected' -}}
          {%- else %}
            {{- 'none' -}}
          {%- endif %}
        ai_status: "{{ states('sensor.ai_dh_price_forecast_status') }}"
        ai_tier2_source: "{{ state_attr('sensor.ai_dh_import_price_forecast', 'tier2_source') | default(none, true) }}"
        ai_import_entity: sensor.ai_dh_import_price_forecast
        ai_export_entity: sensor.ai_dh_export_price_forecast

    - name: 'AI MPC Price Forecast Status'
      state: >
        {%- set import_forecast = state_attr('sensor.ai_mpc_import_price_forecast', 'forecast') | default([], true) %}
        {%- set export_forecast = state_attr('sensor.ai_mpc_export_price_forecast', 'forecast') | default([], true) %}
        {%- set first = as_datetime(import_forecast[0].datetime) if import_forecast | count > 0 else none %}
        {%- set last = as_datetime(import_forecast[167].datetime) if import_forecast | count >= 168 else none %}
        {%- set export_first = as_datetime(export_forecast[0].datetime) if export_forecast | count > 0 else none %}
        {%- set fresh = first != none and first <= utcnow() + timedelta(minutes=10) %}
        {%- set horizon_ok = last != none and last >= utcnow() + timedelta(hours=13, minutes=30) %}
        {%- set aligned = first != none and export_first != none and first == export_first %}
        {%- set import_source = state_attr('sensor.ai_mpc_import_price_forecast', 'tier2_source') | default('', true) %}
        {%- set export_source = state_attr('sensor.ai_mpc_export_price_forecast', 'tier2_source') | default('', true) %}
        {%- set source_ok = import_source == export_source and import_source in ['PD-direct', 'cached PD-direct'] %}
        {%- if import_forecast | count >= 168 and export_forecast | count >= 168 and fresh and horizon_ok and aligned and source_ok %}
          ready
        {%- else %}
          not_ready
        {%- endif %}
      attributes:
        expected_count: 168
        interval_minutes: 5
        import_count: >
          {{ state_attr('sensor.ai_mpc_import_price_forecast', 'forecast') | default([], true) | count }}
        export_count: >
          {{ state_attr('sensor.ai_mpc_export_price_forecast', 'forecast') | default([], true) | count }}
        tier2_source_import: >
          {{ state_attr('sensor.ai_mpc_import_price_forecast', 'tier2_source') | default(none, true) }}
        tier2_source_export: >
          {{ state_attr('sensor.ai_mpc_export_price_forecast', 'tier2_source') | default(none, true) }}
        import_first_value: >
          {%- set forecast = state_attr('sensor.ai_mpc_import_price_forecast', 'forecast') | default([], true) %}
          {{ forecast[0].native_value if forecast | count > 0 else none }}
        export_first_value: >
          {%- set forecast = state_attr('sensor.ai_mpc_export_price_forecast', 'forecast') | default([], true) %}
          {{ forecast[0].native_value if forecast | count > 0 else none }}
        import_first_datetime: >
          {%- set forecast = state_attr('sensor.ai_mpc_import_price_forecast', 'forecast') | default([], true) %}
          {{ forecast[0].datetime if forecast | count > 0 else none }}
        export_first_datetime: >
          {%- set forecast = state_attr('sensor.ai_mpc_export_price_forecast', 'forecast') | default([], true) %}
          {{ forecast[0].datetime if forecast | count > 0 else none }}
        import_last_datetime: >
          {%- set forecast = state_attr('sensor.ai_mpc_import_price_forecast', 'forecast') | default([], true) %}
          {{ forecast[167].datetime if forecast | count >= 168 else none }}
        first_offset_minutes: >
          {%- set forecast = state_attr('sensor.ai_mpc_import_price_forecast', 'forecast') | default([], true) %}
          {%- set first = as_datetime(forecast[0].datetime) if forecast | count > 0 else none %}
          {{ ((first - utcnow()).total_seconds() / 60) | round(1) if first != none else none }}
        horizon_remaining_hours: >
          {%- set forecast = state_attr('sensor.ai_mpc_import_price_forecast', 'forecast') | default([], true) %}
          {%- set last = as_datetime(forecast[167].datetime) if forecast | count >= 168 else none %}
          {{ ((last - utcnow()).total_seconds() / 3600) | round(2) if last != none else none }}
        freshness_guard: >
          {%- set forecast = state_attr('sensor.ai_mpc_import_price_forecast', 'forecast') | default([], true) %}
          {%- set first = as_datetime(forecast[0].datetime) if forecast | count > 0 else none %}
          {{ first != none and first <= utcnow() + timedelta(minutes=10) }}
        horizon_guard: >
          {%- set forecast = state_attr('sensor.ai_mpc_import_price_forecast', 'forecast') | default([], true) %}
          {%- set last = as_datetime(forecast[167].datetime) if forecast | count >= 168 else none %}
          {{ last != none and last >= utcnow() + timedelta(hours=13, minutes=30) }}
        alignment_guard: >
          {%- set import_forecast = state_attr('sensor.ai_mpc_import_price_forecast', 'forecast') | default([], true) %}
          {%- set export_forecast = state_attr('sensor.ai_mpc_export_price_forecast', 'forecast') | default([], true) %}
          {%- set first = as_datetime(import_forecast[0].datetime) if import_forecast | count > 0 else none %}
          {%- set export_first = as_datetime(export_forecast[0].datetime) if export_forecast | count > 0 else none %}
          {{ first != none and export_first != none and first == export_first }}
        source_guard: >
          {%- set import_source = state_attr('sensor.ai_mpc_import_price_forecast', 'tier2_source') | default('', true) %}
          {%- set export_source = state_attr('sensor.ai_mpc_export_price_forecast', 'tier2_source') | default('', true) %}
          {{ import_source == export_source and import_source in ['PD-direct', 'cached PD-direct'] }}
        convention: haeo_positive_import_export
        timestamp_convention: utc_iso8601

